# Mammotion Agora → RTSP passthrough bridge (aiortc-relay branch).
#
# The bridge subscribes to the mower's Agora WebRTC channel using a patched
# aiortc stack and exposes the H265 stream as a plain RTSP server which go2rtc
# (Frigate's bundled one or a standalone instance) consumes via `rtsp://`.
# No ffmpeg, no transcoding, one process.
#
# Paste this service into your Frigate compose so it shares Frigate's network
# (lets the bridge reach `frigate:1984` for the go2rtc REST API, and lets
# go2rtc reach the bridge at `mammotion-webrtc:8554` for RTSP).

services:
  mammotion-webrtc:
    container_name: mammotion-webrtc
    # Latest aiortc-relay build:
    image: ghcr.io/bleialf/mammotion-rtsp-bridge:aiortc-test
    # ...or build locally from this checkout:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BRIDGE_SCRIPT: "mammotion_webrtc_bridge.py"
      MAMMOTION_EMAIL: "your@email.com"
      MAMMOTION_PASSWORD: "your-password"
      # go2rtc REST API base used for stream registration.
      GO2RTC_API_URL: "http://frigate:1984"
      # Distinct go2rtc stream name so it coexists with any existing
      # `mammotion` RTSP stream you may already have wired.
      MAMMOTION_STREAM_NAME: "mammotion_webrtc"
      # Host go2rtc uses to dial the bridge's RTSP server.
      MAMMOTION_RTSP_HOST: "mammotion-webrtc"

    # If this is a SEPARATE compose project from Frigate, attach to Frigate's
    # network (find it with `docker network ls`) so `frigate` resolves:
    # networks:
    #   - frigate_net
# networks:
#   frigate_net:
#     external: true
#     name: frigate_default
