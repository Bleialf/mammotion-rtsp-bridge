# go2rtc stream definition for the Mammotion bridge.
#
# Frigate users: this is already covered by frigate.example.yaml (Frigate runs
# its own go2rtc). Use this file only if you run a STANDALONE go2rtc — in that
# case drop the outer `go2rtc:` key and keep just the `streams:` block.
#
# The empty `mammotion:` value declares a stream with no source: go2rtc accepts
# an RTSP publish on that name (from the bridge) and serves it to any consumer
# over RTSP / WebRTC / HLS / MSE. The name must match GO2RTC_PUBLISH_URL.

go2rtc:
  streams:
    mammotion:
